<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" > 
    <meta name="viewport" content="width=device-width , initial-scale=1.0">
    <link rel="stylesheet" href="../style.css">
    <title> Add Course </title>
</head>
<body>
    <form class="course-form">
        <h3>ADD COURSE</h3>
        <label>Course Name : </label>
        <input type="text" placeholder="Enter Course Name" required>
        <br>
        <label>Instructor : </label>
        <input type="text" placeholder="Enter Instructor Name">
        <br>
        <label>Credit Hours : </label>
        <input type="text" placeholder="Enter Credit Hours">
        <br>
        <label for="notes">Notes : </label>
        <textarea id="notes" name="notes" placeholder="Enter Aditional Notes"></textarea> 
        <br>
        <input type="submit" class="submit" value="Add Course">
    </form>
</body>
</html>
